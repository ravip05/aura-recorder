<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0d0d12;
      overflow: hidden;
    }

    /* Loading state — visible until camera stream starts */
    .loading-state {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: radial-gradient(circle, rgba(157,78,221,0.15) 0%, #0d0d12 70%);
      z-index: 2;
      transition: opacity 0.4s ease;
    }

    .loading-state.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .pulse-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(157,78,221,0.6);
      animation: pulse-loading 1.4s ease-in-out infinite;
    }

    @keyframes pulse-loading {
      0%, 100% { transform: scale(0.8); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* Mirror camera */
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="loading-state" id="loading-state">
    <div class="pulse-dot"></div>
  </div>
  <video id="cam-video" autoplay muted playsinline></video>
  <script src="camera.js" type="module"></script>
</body>
</html>
